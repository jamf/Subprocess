name: Build & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  spm:
    name: SwiftPM build and test
    runs-on: macos-latest
    steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - uses: actions/checkout@v6
    - name: Build swift packages
      run: swift build -v
    - name: Run tests
      run: swift test -v
